{% extends "reviews/base.html" %}

{% block title %}Log in | Film Reviews{% endblock %}

{% block content %}
<h1>Log in</h1>

{% if form.errors %}
    <p>Your username and password did not match. Please try again.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <button type="submit">Log in</button>
</form>
{% endblock %}

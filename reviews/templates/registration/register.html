{% extends "reviews/base.html" %}

{% block title %}Create account | Film Reviews{% endblock %}

{% block content %}
<h1>Create account</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create account</button>
</form>

<p>Already registered? <a href="{% url 'login' %}">Log in</a>.</p>
{% endblock %}

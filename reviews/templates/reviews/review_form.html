{% extends "reviews/base.html" %}

{% block title %}Review {{ movie.title }} | Film Reviews{% endblock %}

{% block content %}
<h1>{% if is_update %}Update{% else %}Write{% endif %} your review of {{ movie.title }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save review</button>
</form>

<p><a href="{% url 'reviews:movie_detail' movie.id %}">Cancel</a></p>
{% endblock %}

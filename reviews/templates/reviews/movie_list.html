{% extends "reviews/base.html" %}

{% block title %}Movies | Film Reviews{% endblock %}

{% block content %}
<h1>Movies</h1>

<form action="{% url 'reviews:movie_list' %}" method="get" role="search">
    <label for="movie-search">Search by title</label>
    <input id="movie-search" type="search" name="q" value="{{ query }}">
    <button type="submit">Search</button>
</form>

{% if query %}
    <p>Results for “{{ query }}”</p>
{% endif %}

<ul>
    {% for movie in movies %}
        <li>
            <a href="{% url 'reviews:movie_detail' movie.id %}">{{ movie }}</a>
        </li>
    {% empty %}
        <li>No movies found.</li>
    {% endfor %}
</ul>
{% endblock %}
